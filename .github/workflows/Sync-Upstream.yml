name: Sync Upstream

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch tujuan sync"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          token: ${{ secrets.PAT_WORKFLOW }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with Upstream
        run: |
          git remote remove upstream || true
          git remote add upstream https://github.com/opensensor/lightNVR.git
          git fetch upstream main

          # Merge upstream tanpa menghentikan workflow
          git merge upstream/main --no-commit --no-ff || \
          echo "⚠️ Konflik terdeteksi, melanjutkan..."

          # Commit semua termasuk marker conflict
          git add -A

          git commit -m "Sync: $(date +'%Y-%m-%d %H:%M:%S')" || \
          echo "No changes to commit"

      - name: Push to Repository
        run: |
          git remote set-url origin \
          https://x-access-token:${{ secrets.PAT_WORKFLOW }}@github.com/${{ github.repository }}.git

          # Sinkron branch tujuan
          git pull origin ${{ github.event.inputs.target_branch }} --rebase || true

          # Push ke branch pilihan
          git push origin HEAD:${{ github.event.inputs.target_branch }}

      - name: Notify to Telegram
        if: always()
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          BRANCH="${{ github.event.inputs.target_branch }}"

          FILES=$(git diff --name-status HEAD~1 HEAD \
            | grep -v "^.github/workflows/" || true)

          if [ -z "$FILES" ]; then
            MSG=$(printf "🛎️ Sync selesai\n\nTidak ada update dari upstream.")
          else
            MSG=$(printf "🛎️ *Sync dari upstream selesai*\n\n")

            CURRENT_FOLDER=""

            while read status path; do
              [ -z "$path" ] && continue

              FOLDER=$(dirname "$path")
              FILE=$(basename "$path")

              [ "$FOLDER" = "." ] && FOLDER="root"

              case "$status" in
                A*) ICON="🆕";;
                M*) ICON="✏️";;
                D*) ICON="❌";;
                *)  ICON="📄";;
              esac

              # Group per folder
              if [ "$FOLDER" != "$CURRENT_FOLDER" ]; then
                MSG+=$(printf "\n📁 *%s/*\n" "$FOLDER")
                CURRENT_FOLDER="$FOLDER"
              fi

              # Escape markdown telegram
              SAFE_FILE=$(echo "$FILE" | sed 's/[][()_*`]/\\&/g')

              MSG+=$(printf -- "- %s [%s](%s/blob/%s/%s)\n" \
                "$ICON" "$SAFE_FILE" "$REPO_URL" "$BRANCH" "$path")

            done <<< "$FILES"
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MSG" \
            -d parse_mode="Markdown"
