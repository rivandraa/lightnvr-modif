name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_WORKFLOW }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with Upstream
        run: |
          git remote add upstream https://github.com/opensensor/lightNVR.git || true
          git fetch upstream main
          
          # 1. Merge tanpa berhenti, biarkan Git memasukkan marker <<<<<<<
          # Kita tidak menggunakan -X ours agar konflik tetap muncul/terdeteksi
          git merge upstream/main --no-commit --no-ff || echo "⚠️ Konflik terdeteksi, melanjutkan merge..."
          
          # 2. Add dan Commit semua, termasuk file yang mengandung marker konflik
          git add -A
          git commit -m "Sync: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
      - name: Push to Repository
        run: |
          git push origin main

      - name: Notify to Telegram
        if: always()
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          BRANCH="main"
          
          # Cari file yang mengandung marker konflik
          CONFLICT_FILES=$(grep -rl "<<<<<<<" . | grep -v ".github/workflows/" || true)
          # Cari file yang berubah
          CHANGED_FILES=$(git diff --name-status HEAD^ HEAD | grep -v ".github/workflows/" || true)

          # Logika Pesan
          if [ -n "$CONFLICT_FILES" ]; then
            # Jika ada konflik, buat pesan peringatan khusus
            MSG="🚨 *Sync selesai dengan KONFLIK!*%0A%0AHarap perbaiki file berikut:%0A$CONFLICT_FILES"
          elif [ -n "$CHANGED_FILES" ]; then
            # Jika tidak ada konflik, tampilkan perubahan biasa
            CHANGED=$(echo "$CHANGED_FILES" | while read status path; do
              FILENAME=$(basename "$path")
              echo "- $FILENAME ($status)"
            done)
            MSG=$(printf "🛎️ *Sync sukses*\n\n*File berubah:*\n%s" "$CHANGED")
          else
            MSG="🛎️ *Sync selesai*\n\nTidak ada perubahan."
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$MSG" \
            -d parse_mode="Markdown"
